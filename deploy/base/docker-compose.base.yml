services:
  redis:
    image: redis:7.4-alpine
    container_name: sw-connect-redis
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sw-connect-network

  redis-exporter:
    image: oliver006/redis_exporter:v1.64.0
    container_name: sw-connect-redis-exporter
    command:
      - "--redis.addr=redis://sw-connect-redis:6379"
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - sw-connect-network

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: sw-connect-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)"
    volumes:
      - "/:/host:ro,rslave"
    networks:
      - sw-connect-network

  prod-gateway:
    image: nginx:1.27-alpine
    container_name: sw-connect-prod-gateway
    restart: unless-stopped
    volumes:
      - ./nginx/prod-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - sw-connect-network

  validation-gateway:
    image: nginx:1.27-alpine
    container_name: sw-connect-validation-gateway
    restart: unless-stopped
    volumes:
      - ./nginx/validation-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - sw-connect-network

  npmplus:
    image: ${NPMPLUS_IMAGE:-ghcr.io/zoeyvid/npmplus:latest}
    container_name: sw-connect-npmplus
    restart: unless-stopped
    environment:
      - TZ=Asia/Seoul
    ports:
      - "80:80"
      - "443:443/tcp"
      - "443:443/udp"
      - "127.0.0.1:81:81"
    volumes:
      - npmplus_data:/data
      - npmplus_letsencrypt:/etc/letsencrypt
    depends_on:
      - prod-gateway
      - validation-gateway
    networks:
      - sw-connect-network

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: sw-connect-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - sw-connect-network

  grafana:
    image: grafana/grafana:11.2.0
    container_name: sw-connect-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - sw-connect-network

networks:
  sw-connect-network:
    name: sw-connect-network
    driver: bridge

volumes:
  redis_data:
  npmplus_data:
  npmplus_letsencrypt:
  prometheus_data:
  grafana_data:
