spring:
  datasource:
    url: jdbc:h2:mem:swconnect_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Seoul
  flyway:
    enabled: false
  jackson:
    time-zone: Asia/Seoul

file:
  upload-dir: ./build/test-uploads

custom:
  jwt:
    secret-key: test-test-test-test-test-test-test-test-test-test-test-test
    access-token-expiration-seconds: 1800
    refresh-token-expiration-seconds: 1209600
  cors:
    allowed-origin-patterns:
      - http://localhost:3000

logging:
  level:
    root: WARN
    back.sw: INFO
