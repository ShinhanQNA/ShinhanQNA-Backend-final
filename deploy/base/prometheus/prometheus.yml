global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"

  - job_name: "prod-app-blue"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "sw-connect-prod-blue:8080"

  - job_name: "prod-app-green"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "sw-connect-prod-green:8080"

  - job_name: "validation-app"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "sw-connect-validation:8080"

  - job_name: "redis-exporter"
    static_configs:
      - targets:
          - "sw-connect-redis-exporter:9121"

  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "sw-connect-node-exporter:9100"
